<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0d2854;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1c4b82;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#ffd700;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
        </linearGradient>
        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3" />
        </filter>
    </defs>

    <!-- Shield Base -->
    <path d="M50 5 L15 15 L15 50 C15 75 50 95 50 95 C50 95 85 75 85 50 L85 15 Z" fill="url(#shieldGrad)" stroke="url(#goldGrad)" stroke-width="4" filter="url(#dropShadow)" />
    
    <!-- Inner Border -->
    <path d="M50 12 L22 19 L22 50 C22 68 50 84 50 84 C50 84 78 68 78 50 L78 19 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Text UP -->
    <text x="50" y="55" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="2">UP</text>
    
    <!-- Text POLICE -->
    <text x="50" y="72" font-family="Arial, sans-serif" font-weight="bold" font-size="10" fill="#ffffff" text-anchor="middle" letter-spacing="1">POLICE</text>

    <!-- Star Top -->
    <polygon points="50,18 53,24 59,24 54,28 56,34 50,31 44,34 46,28 41,24 47,24" fill="url(#goldGrad)" />
</svg>
